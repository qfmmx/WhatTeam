spring:
  application:
    name: networker-backend
  profiles:
    active: dev
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/nepu?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowZeroDateTime=true&zeroDateTimeBehavior=convertToNull
    username: root
    password: 123456

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

server:
  port: 8080
